services:
  baseful:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baseful
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend-data:/app/data
      - ./caddy-data:/root/.local/share/caddy
      - .:/repo
    environment:
      - DB_PATH=/app/data/data.db
      - PORT=3002
    env_file:
      - .env
    ports:
      - "3002:3002"
      - "80:80"
      - "443:443"
      - "6432:6432"
    networks:
      - baseful-network
    restart: unless-stopped

networks:
  baseful-network:
    external: true
